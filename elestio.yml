config:
  runTime: "dockerCompose"
  version: ""
  framework: "fastapi"
  installCommand: ""
  buildCommand: "docker-compose -f docker-compose.prod.yml build"
  buildDir: "/"
  runCommand: "docker-compose -f docker-compose.prod.yml up -d"
  isMonoRepoPackageInRoot: false

environments:
  - key: "DATABASE_URL"
    value: "${DATABASE_URL}"
  - key: "PGVECTOR_URI"
    value: "${PGVECTOR_URI}"
  - key: "OPENAI_API_KEY"
    value: "${OPENAI_API_KEY}"
  - key: "OPENAI_BASE_URL"
    value: "https://api.openai.com/v1"
  - key: "EMBEDDING_MODEL"
    value: "text-embedding-3-small"
  - key: "EMBEDDING_DIM"
    value: "1536"
  - key: "DEEPSEEK_API_KEY"
    value: "${DEEPSEEK_API_KEY}"
  - key: "DEEPSEEK_BASE_URL"
    value: "https://api.deepseek.com/v1"
  - key: "DEEPSEEK_MODEL"
    value: "${DEEPSEEK_MODEL:-deepseek-v4-pro}"
  - key: "AI_ASSISTANT_SECRET"
    value: "${AI_ASSISTANT_SECRET}"

ports:
  - protocol: "HTTPS"
    targetProtocol: "HTTP"
    listeningPort: "443"
    targetPort: "8000"
    targetIP: "172.17.0.1"
    public: true
    path: "/"
    isAuth: false
    login: ""
    password: ""

webUI:
  - url: "https://[CI_CD_DOMAIN]/docs"
    label: "API Docs"
