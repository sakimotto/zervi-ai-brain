name: Deploy Brain to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ELESTIO_SSH_KEY }}
          log-public-key: false

      - name: Deploy to Elestio
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.ELESTIO_USER }}@${{ secrets.ELESTIO_HOST }} <<'EOF'
            set -e
            cd /opt/app/zervi-ai-brain
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            echo "AI brain deployed and restarted"
          EOF
